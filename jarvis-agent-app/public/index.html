<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.A.R.V.I.S. — 智能Agent控制台</title>
  <style>
    :root {
      --cyan: #00d4ff;
      --blue: #0088bb;
      --orange: #ff6600;
      --bg: #060a14;
      --bg-panel: rgba(8, 16, 32, 0.9);
      --bg-card: rgba(4, 12, 24, 0.7);
      --text: #d8e4ef;
      --dim: #5a6e82;
      --green: #00ff88;
      --amber: #ffaa00;
      --red: #ff3366;
      --border: rgba(0, 212, 255, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; min-height: 100vh; overflow-x: hidden; }
    
    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg-panel); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); }
    .logo { display: flex; align-items: center; gap: 14px; }
    .orb-small { width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle, var(--cyan), var(--blue)); box-shadow: 0 0 20px 4px rgba(0, 212, 255, 0.3); animation: pulse 3s ease-in-out infinite; position: relative; }
    .orb-small::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(0, 212, 255, 0.4); animation: spin 8s linear infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px 4px rgba(0, 212, 255, 0.3); } 50% { box-shadow: 0 0 30px 8px rgba(0, 212, 255, 0.5); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .logo h1 { font-size: 20px; letter-spacing: 6px; font-weight: 300; background: linear-gradient(135deg, var(--cyan), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo .tagline { font-size: 10px; color: var(--dim); letter-spacing: 2px; }
    .status-bar { display: flex; align-items: center; gap: 16px; font-size: 12px; }
    .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-item { display: flex; align-items: center; gap: 6px; }

    /* Main layout */
    .main { display: grid; grid-template-columns: 280px 1fr 300px; gap: 0; min-height: calc(100vh - 69px); }
    
    /* Sidebar */
    .sidebar { background: var(--bg-panel); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-title { font-size: 11px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; }
    .module-btn { width: 100%; padding: 10px 14px; margin-bottom: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: left; }
    .module-btn:hover { border-color: var(--cyan); background: rgba(0, 212, 255, 0.08); }
    .module-btn.active { border-color: var(--cyan); background: rgba(0, 212, 255, 0.12); box-shadow: 0 0 12px rgba(0, 212, 255, 0.15); }
    .module-btn .icon { margin-right: 8px; }
    
    /* Center */
    .center { display: flex; flex-direction: column; }
    
    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; color: var(--cyan); }

    /* Chat area */
    .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .msg.bot .avatar { background: rgba(0, 212, 255, 0.15); border: 1px solid rgba(0, 212, 255, 0.3); }
    .msg.user .avatar { background: rgba(255, 102, 0, 0.15); border: 1px solid rgba(255, 102, 0, 0.3); }
    .msg .bubble { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
    .msg.bot .bubble { background: var(--bg-card); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .msg.user .bubble { background: rgba(0, 136, 187, 0.2); border: 1px solid rgba(0, 136, 187, 0.3); border-top-right-radius: 4px; }
    .msg .time { font-size: 10px; color: var(--dim); margin-top: 4px; }
    .msg.user .time { text-align: right; }

    /* Input bar */
    .input-bar { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-panel); backdrop-filter: blur(12px); }
    .input-bar input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .input-bar input:focus { border-color: var(--cyan); }
    .input-bar input::placeholder { color: var(--dim); }
    .btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn-send { background: linear-gradient(135deg, var(--cyan), var(--blue)); color: var(--bg); }
    .btn-send:hover { box-shadow: 0 0 16px rgba(0, 212, 255, 0.4); transform: translateY(-1px); }
    .btn-tool { background: rgba(0, 212, 255, 0.1); color: var(--cyan); border: 1px solid rgba(0, 212, 255, 0.25); }
    .btn-tool:hover { background: rgba(0, 212, 255, 0.2); }

    /* Right panel */
    .right-panel { background: var(--bg-panel); border-left: 1px solid var(--border); padding: 16px; overflow-y: auto; font-size: 12px; }
    .panel-block { margin-bottom: 20px; }
    .panel-block h3 { font-size: 12px; letter-spacing: 1px; color: var(--cyan); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .info-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(0, 212, 255, 0.05); }
    .info-key { color: var(--dim); }
    .info-val { color: var(--text); }
    .log-list { max-height: 300px; overflow-y: auto; }
    .log-item { padding: 6px 0; border-bottom: 1px solid rgba(0, 212, 255, 0.05); }
    .log-time { color: var(--dim); font-family: 'Courier New', monospace; font-size: 11px; }
    .log-content { color: var(--text); margin-top: 2px; }
    
    /* Quick actions */
    .quick-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip { padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); transition: all 0.2s; }
    .chip:hover { border-color: var(--cyan); background: rgba(0, 212, 255, 0.1); }

    /* Responsive */
    @media (max-width: 1100px) { .main { grid-template-columns: 1fr; } .sidebar, .right-panel { display: none; } .stats-row { grid-template-columns: repeat(2, 1fr); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="orb-small"></div>
      <div>
        <h1>J.A.R.V.I.S.</h1>
        <div class="tagline">Just A Rather Very Intelligent System</div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-item"><span class="status-dot"></span><span id="statusText">连接中...</span></div>
      <div class="status-item" style="color:var(--dim)">Session: <span id="sessionId" style="color:var(--cyan)">—</span></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">🔧 工具模块</div>
        <button class="module-btn" onclick="quickAction('get_weather','北京')">
          <span class="icon">🌤</span> 天气查询
        </button>
        <button class="module-btn" onclick="quickAction('generate_data','sales_q1',100)">
          <span class="icon">📊</span> 生成数据集
        </button>
        <button class="module-btn" onclick="quickAction('create_task','季度汇报','2026-07-01','high')">
          <span class="icon">📋</span> 创建任务
        </button>
        <button class="module-btn" onclick="quickAction('list_tasks')">
          <span class="icon">✅</span> 任务列表
        </button>
        <button class="module-btn" onclick="quickAction('set_reminder','检查服务器状态',10)">
          <span class="icon">⏰</span> 设提醒
        </button>
        <button class="module-btn" onclick="quickAction('create_file','/tmp/test.txt','Hello JARVIS!')">
          <span class="icon">📄</span> 创建文件
        </button>
        <button class="module-btn" onclick="quickAction('read_file','/tmp/test.txt')">
          <span class="icon">📖</span> 读取文件
        </button>
        <button class="module-btn" onclick="quickAction('generate_report','项目进度',JSON.stringify([{title:'概述',content:'项目按期推进中'}]))">
          <span class="icon">📝</span> 生成报告
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">💬 快捷指令</div>
        <div class="quick-actions">
          <span class="chip" onclick="sendMessage('你好，请做自我介绍')">自我介绍</span>
          <span class="chip" onclick="sendMessage('帮我分析一下销售数据')">分析数据</span>
          <span class="chip" onclick="sendMessage('今天的计划是什么？')">今日计划</span>
          <span class="chip" onclick="sendMessage('给我讲个冷笑话')">冷笑话</span>
          <span class="chip" onclick="sendMessage('北京天气如何？')">天气</span>
          <span class="chip" onclick="sendMessage('系统状态？')">系统状态</span>
        </div>
      </div>
    </div>

    <!-- Center: Chat -->
    <div class="center">
      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">消息数</div><div class="stat-value" id="statMsgs">0</div></div>
        <div class="stat-card"><div class="stat-label">工具调用</div><div class="stat-value" id="statTools">0</div></div>
        <div class="stat-card"><div class="stat-label">记忆条目</div><div class="stat-value" id="statMemory">0</div></div>
        <div class="stat-card"><div class="stat-label">会话时长</div><div class="stat-value" id="statTime">00:00</div></div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="msg bot">
          <div class="avatar">🤖</div>
          <div>
            <div class="bubble">你好！我是 <strong>J.A.R.V.I.S.</strong> 智能Agent系统。<br>我已准备好协助你处理各类任务。请问需要什么帮助？</div>
            <div class="time" id="startTime"></div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-bar">
        <input type="text" id="chatInput" placeholder="输入消息或选择左侧工具模块..." autofocus />
        <button class="btn btn-tool" onclick="sendMessageViaTool('agent_chat', document.getElementById('chatInput').value)">语音</button>
        <button class="btn btn-send" onclick="handleChatSend()">发送</button>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="panel-block">
        <h3>▸ 系统信息</h3>
        <div class="info-row"><span class="info-key">版本</span><span class="info-val">0.1.0</span></div>
        <div class="info-row"><span class="info-key">框架</span><span class="info-val">FastAPI + Python</span></div>
        <div class="info-row"><span class="info-key">Session</span><span class="info-val" id="rightSession">—</span></div>
        <div class="info-row"><span class="info-key">知识图谱</span><span class="info-val" id="rightKG">0</span></div>
        <div class="info-row"><span class="info-key">可用工具</span><span class="info-val" id="rightTools">—</span></div>
      </div>
      <div class="panel-block">
        <h3>▸ 最近任务</h3>
        <div id="taskList"><div class="info-row"><span class="info-key" style="color:var(--dim)">暂无任务</span></div></div>
      </div>
      <div class="panel-block">
        <h3>▸ 活动日志</h3>
        <div class="log-list" id="logList">
          <div class="log-item"><div class="log-time">--:--:--</div><div class="log-content">系统启动中...</div></div>
        </div>
      </div>
    </div>
  </div>

<script>
const API = '';
let sessionId = '';
let msgCount = 0;
let toolCount = 0;
let startTime = Date.now();

// Initialize
document.getElementById('startTime').textContent = formatTime(new Date());
setInterval(updateTimer, 1000);
loadStatus();

function formatTime(d) {
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

function updateTimer() {
  const diff = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(diff / 60)).padStart(2, '0');
  const s = String(diff % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = `${m}:${s}`;
}

async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    sessionId = data.session;
    document.getElementById('sessionId').textContent = sessionId;
    document.getElementById('rightSession').textContent = sessionId;
    document.getElementById('rightKG').textContent = data.knowledge_graph_size;
    document.getElementById('statMemory').textContent = data.memory_size;
    document.getElementById('rightTools').textContent = data.available_tools.length;
    document.getElementById('statusText').textContent = '在线';
    addLog('INFO', '系统连接成功');
  } catch (e) {
    document.getElementById('statusText').textContent = '离线';
    addLog('ERROR', '无法连接到后端: ' + e.message);
  }
}

async function handleChatSend() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  await sendMessage('agent_chat', { message: msg });
}

async function sendMessage(type, payload) {
  if (typeof payload === 'string' && !type) {
    type = 'agent_chat';
    payload = { message: payload };
  }
  if (type === 'agent_chat') {
    document.getElementById('chatInput').value = '';
    addMessage('user', payload.message);
    
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: payload.message, modality: 'text', session_id: sessionId }),
      });
      const data = await res.json();
      addMessage('bot', data.output, data.reasoning);
      msgCount++;
      document.getElementById('statMsgs').textContent = msgCount;
    } catch (e) {
      addMessage('bot', '⚠️ 请求失败: ' + e.message);
    }
  }
}

function sendMessageViaTool(tool, msg) {
  if (tool === 'agent_chat' && msg) {
    sendMessage('agent_chat', msg);
  }
}

async function quickAction(tool, ...args) {
  const argStr = args.length ? JSON.stringify(args) : '{}';
  document.getElementById('chatInput').value = `[${tool}]`;
  addMessage('user', `🔧 调用工具: ${tool}(${argStr})`);
  
  try {
    const res = await fetch('/api/tool', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tool, args: args.length ? JSON.parse(argStr) : {} }),
    });
    const data = await res.json();
    const output = data.result || data;
    addMessage('bot', JSON.stringify(output, null, 2), `tool: ${tool}`);
    toolCount++;
    document.getElementById('statTools').textContent = toolCount;
    addLog('TOOL', `${tool}: ${data.status || 'done'}`);
    
    // Refresh tasks if relevant
    if (tool === 'create_task' || tool === 'list_tasks') {
      loadTasks();
    }
  } catch (e) {
    addMessage('bot', `⚠️ 工具调用失败: ${e.message}`);
  }
}

function addMessage(role, text, meta) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div>
      <div class="bubble">${meta ? `<div style="color:var(--cyan);font-size:11px;margin-bottom:4px">▸ ${meta}</div>` : ''}${text}</div>
      <div class="time">${formatTime(new Date())}</div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLog(type, msg) {
  const logList = document.getElementById('logList');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `<div class="log-time">${formatTime(new Date())}</div><div class="log-content">${msg}</div>`;
  logList.insertBefore(item, logList.firstChild);
}

async function loadTasks() {
  try {
    const res = await fetch('/api/scheduler/tasks');
    const data = await res.json();
    const el = document.getElementById('taskList');
    if (data.tasks.length === 0) {
      el.innerHTML = '<div class="info-row"><span class="info-key" style="color:var(--dim)">暂无任务</span></div>';
      return;
    }
    el.innerHTML = data.tasks.map(t => 
      `<div class="info-row"><span class="info-key">${t.title}</span><span class="info-val" style="color:var(--amber)">${t.status}</span></div>`
    ).join('');
  } catch (e) {
    console.warn('Failed to load tasks:', e);
  }
}

// Enter key
document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleChatSend();
});
</script>
</body>
</html>
