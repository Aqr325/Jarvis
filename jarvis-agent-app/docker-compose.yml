# =============================================================================
# Docker Compose for J.A.R.V.I.S. Agent
# =============================================================================
# 
# Start:
#   docker-compose up -d
#
# Stop:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f jarvis
#
# Scale:
#   docker-compose up -d --scale jarvis=3
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # J.A.R.V.I.S. Agent Server
  # ---------------------------------------------------------------------------
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: jarvis-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Sentry configuration (optional)
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      
      # Application configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=8000
      
      # LLM Configuration (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      
      # Redis for rate limiting (optional)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - jarvis-logs:/app/logs
      - jarvis-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - redis
    networks:
      - jarvis-network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis for rate limiting and caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Prometheus for metrics (optional)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: jarvis-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - jarvis-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Grafana for visualization (optional)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: jarvis-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - redis
    networks:
      - jarvis-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  jarvis-network:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  jarvis-logs:
    driver: local
  jarvis-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
